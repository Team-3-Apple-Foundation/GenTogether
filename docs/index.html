<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenTogether</title>
<style>
  :root {
    --cream: #F6F2EC;
    --header-tan: #D8AE86;
    --header-tan-deep: #C99A6C;
    --ink: #2B2420;
    --ink-soft: #6B6357;
    --accent: #B8703F;
    --card: #FFFFFF;
    --line: #E7DFD3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65;
  }
  header {
    background: linear-gradient(180deg, var(--header-tan) 0%, var(--header-tan-deep) 100%);
    padding: 72px 24px 56px;
    text-align: center;
  }
  header h1 {
    margin: 0 0 10px;
    font-size: clamp(34px, 6vw, 48px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #241C14;
  }
  header p {
    margin: 0;
    color: #3A2E1F;
    font-size: 17px;
    opacity: 0.9;
    max-width: 480px;
    margin: 0 auto;
  }
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    display: grid;
    gap: 16px;
  }
  .link-card {
    display: block;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 24px;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.15s ease;
  }
  .link-card:hover { border-color: var(--header-tan-deep); }
  .link-card .title {
    font-weight: 800;
    font-size: 17px;
    margin-bottom: 4px;
  }
  .link-card .desc {
    color: var(--ink-soft);
    font-size: 14px;
  }
  footer {
    text-align: center;
    padding: 32px 24px 48px;
    color: var(--ink-soft);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <h1>GenTogether</h1>
  <p>Learn to identify generative AI, one round at a time.</p>
</header>

<main>
  <a class="link-card" href="support.html">
    <div class="title">Support</div>
    <div class="desc">Get help, report a bug, or find answers to common questions.</div>
  </a>
  <a class="link-card" href="privacy.html">
    <div class="title">Privacy Policy</div>
    <div class="desc">What we collect, how it's used, and your choices.</div>
  </a>
</main>

<footer>
  GenTogether
</footer>

</body>
</html>
